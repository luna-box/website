<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Luna — Compila código Lua a binarios estáticos ultra rápidos usando Zig">
  <title>Luna — Lua to Static Binary Compiler</title>

  <!-- Fonts hermosas y suaves -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Source+Code Pro:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Docsify Dark Theme (nativo) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/dark.css">

  <!-- Catppuccin Theme para acentos -->
  <link rel="stylesheet" href="https://docsify.catppuccin.com/macchiato/sapphire.css" />
  <link rel="stylesheet" href="/static/css/styles.css">
  <style>
    /* Solo configuración de fuentes, nada más */
    body,
    html,
    .markdown-section,
    .sidebar,
    .app-nav,
    .search {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-weight: 400;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Títulos más elegantes */
    .markdown-section h1,
    .markdown-section h2,
    .markdown-section h3,
    .markdown-section h4,
    .markdown-section h5,
    .markdown-section h6,
    .sidebar-nav li a,
    .app-nav a,
    .cover h1 {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    /* Código con tipografía mono hermosa */
    code,
    pre,
    .markdown-section pre,
    .markdown-section code,
    .token,
    .prism-code,
    .language-* {
      font-family: 'JetBrains Mono', 'IBM Plex Mono', 'Source Code Pro', monospace;
      font-weight: 450;
      font-size: 0.9em;
      letter-spacing: -0.002em;
    }

    /* Sidebar con fuente más suave */
    .sidebar-nav li a {
      font-weight: 450;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    .sidebar-nav li a:hover {
      opacity: 1;
    }

    /* Texto general más suave */
    .markdown-section p,
    .markdown-section li {
      font-weight: 400;
      line-height: 1.7;
      letter-spacing: -0.002em;
    }

    /* Cover page título */
    .cover h1 {
      font-weight: 800;
      letter-spacing: -0.03em;
      color: #f38ba8 !important;
      /* Rosa/Coral de Catppuccin */
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.3);
    }

    .cover.show {
      font-weight: 800;
      letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 0%, #f38ba8 100%) !important;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
  </style>
</head>

<body>

  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'LUNA_',
      repo: 'luna-box/luna',
      loadSidebar: true,
      loadNavbar: true,
      auto2top: true,
      subMaxLevel: 2,
      basePath: './docs/',
      homepage: 'README.md',
      coverpage: true,
      notFoundPage: '_404.md',

      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Buscar...',
        noData: 'No se encontraron resultados',
        depth: 4
      },

      copyCode: {
        buttonText: 'Copiar',
        successText: '✓'
      },

      pagination: {
        previousText: 'Anterior',
        nextText: 'Siguiente'
      },

      giscus: {
        repo: "luna-box/luna",
        repoId: "R_kgDOPeLrtQ",
        category: "General",
        categoryId: "DIC_kwDOPeLrtc4CuSAL",
        mapping: "pathname",
        reactionsEnabled: "1",
        emitMetadata: "0",
        inputPosition: "bottom",
        theme: "catppuccin_macchiato",
        lang: "es",
        loading: "lazy"
      }
    };
  </script>

  <!-- Docsify Core -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>

  <!-- Plugins esenciales -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination@2/dist/docsify-pagination.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/emoji.min.js"></script>

  <!-- Soporte de sintaxis para lenguajes -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-lua.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-zig.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1/components/prism-json.min.js"></script>

  <!-- Plugin y estilos de docsify-giscus -->
  <link rel="stylesheet" href="https://unpkg.com/docsify-giscus@1.0.0/dist/giscus.css">
  <script src="https://unpkg.com/docsify-giscus@1.0.0/dist/docsify-giscus.min.js"></script>
</body>

</html>
